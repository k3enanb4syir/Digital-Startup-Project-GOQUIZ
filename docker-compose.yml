services:
  postgres:
    image: postgres:15
    container_name: quiz_postgres
    environment:
      POSTGRES_USER: quiz_user
      POSTGRES_PASSWORD: quiz_password
      POSTGRES_DB: quiz_db
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quiz_network

  redis:
    image: redis:7
    container_name: quiz_redis
    ports:
      - "6379:6379"
    networks:
      - quiz_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: quiz_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - quiz_network

  auth-service:
    build: ./auth-service
    container_name: auth_service
    environment:
      DB_HOST: postgres
      DB_USER: quiz_user
      DB_PASSWORD: quiz_password
      DB_NAME: quiz_db
      DB_PORT: 5432
      JWT_SECRET: quiz_secret_key
    depends_on:
      - postgres
    networks:
      - quiz_network

  quiz-service:
    build: ./quiz-service
    container_name: quiz_service
    environment:
      DB_HOST: postgres
      DB_USER: quiz_user
      DB_PASSWORD: quiz_password
      DB_NAME: quiz_db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: quiz_secret_key
    depends_on:
      - postgres
      - redis
    networks:
      - quiz_network

  submission-service:
    build: ./submission-service
    container_name: submission_service
    environment:
      DB_HOST: postgres
      DB_USER: quiz_user
      DB_PASSWORD: quiz_password
      DB_NAME: quiz_db
      DB_PORT: 5432
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: quiz_secret_key
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - quiz_network

  scoring-worker:
    build: ./scoring-worker
    container_name: scoring_worker
    environment:
      DB_HOST: postgres
      DB_USER: quiz_user
      DB_PASSWORD: quiz_password
      DB_NAME: quiz_db
      DB_PORT: 5432
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - quiz_network

  frontend:
    build: ./frontend
    container_name: quiz_frontend
    networks:
      - quiz_network

  gateway:
    image: nginx:latest
    container_name: quiz_gateway
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - auth-service
      - quiz-service
      - submission-service
    networks:
      - quiz_network

volumes:
  postgres_data:

networks:
  quiz_network:
    driver: bridge